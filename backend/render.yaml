services:
  - type: web
    name: infinea-api
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        value: https://infinea-api.onrender.com
      - key: FRONTEND_URL
        value: https://infinea.app
      - key: ALLOWED_ORIGINS
        value: https://infinea.app
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ADMIN_SECRET
        sync: false

  # Weekly summary email — every Monday 08:00 UTC (10:00 Paris)
  - type: cron
    name: infinea-weekly-summary
    runtime: python
    schedule: "0 8 * * 1"
    buildCommand: pip install requests
    startCommand: python cron_weekly_summary.py
    envVars:
      - key: BACKEND_URL
        value: https://infinea-api.onrender.com
      - key: ADMIN_SECRET
        sync: false
